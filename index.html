<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Gatekeeper of the Oasis — Legal Wisdom for SaaS AEs</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #181c2e;
    --panel-2: #1c2040;
    --ink: #eef0ff;
    --muted: #9aa0c7;
    --accent: #7c9cff;
    --gold: #d4a853;
    --scroll-color: #a78bfa;
    --good: #4ade80;
    --warn: #fbbf24;
    --bad: #f87171;
    --border: #2a2f55;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background:
      radial-gradient(800px 400px at 50% 85%, rgba(212,168,83,0.18) 0%, transparent 70%),
      radial-gradient(1200px 600px at 20% 10%, rgba(122,95,200,0.15) 0%, transparent 60%),
      linear-gradient(180deg, #0b0e18 0%, #14182a 40%, #1a1728 75%, #2a2035 100%);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }
  /* Distant horizon: subtle sand glow + starry sky feel */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none;
    background:
      radial-gradient(2px 2px at 20% 15%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 75% 20%, rgba(255,255,200,0.45), transparent),
      radial-gradient(1.5px 1.5px at 50% 8%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1px 1px at 90% 30%, rgba(255,255,200,0.4), transparent),
      radial-gradient(1.5px 1.5px at 10% 35%, rgba(200,200,255,0.3), transparent);
    filter: drop-shadow(0 0 3px rgba(212, 168, 83, 0.3));
    z-index: 0;
    animation: starsGlow 3.2s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }

  /* Oasis horizon scene (palm trees + archway) */
  .oasis-scene {
    position: relative;
    height: 120px;
    margin: 0 -8px 20px;
    display: flex; align-items: flex-end; justify-content: space-between;
    pointer-events: none;
  }
  .palm {
    width: 90px; height: 120px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
    transform-origin: 50% 100%;
    animation: palmSway 4.2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite, palmBob 3.8s ease-in-out infinite;
  }
  .palm-right {
    transform: scaleX(-1);
    animation: palmSwayMirror 4.5s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite 0.6s, palmBob 3.5s ease-in-out infinite 0.8s;
  }
  @keyframes palmSway {
    0%, 100% { transform: rotate(-8deg) translateY(0px); }
    25%      { transform: rotate(5deg) translateY(-2px); }
    50%      { transform: rotate(12deg) translateY(-3px); }
    75%      { transform: rotate(-5deg) translateY(-1px); }
  }
  @keyframes palmSwayMirror {
    0%, 100% { transform: scaleX(-1) rotate(-12deg) translateY(0px); }
    25%      { transform: scaleX(-1) rotate(-5deg) translateY(-2px); }
    50%      { transform: scaleX(-1) rotate(8deg) translateY(-3px); }
    75%      { transform: scaleX(-1) rotate(5deg) translateY(-1px); }
  }
  @keyframes palmBob {
    0%, 100% { transform: translateY(0px); }
    50%      { transform: translateY(-3px); }
  }
  .archway-bg {
    position: absolute; left: 50%; bottom: 0;
    transform: translateX(-50%);
    width: 240px; height: 110px;
    opacity: 0.45;
  }
  .sand-dune {
    position: absolute; left: 0; right: 0; bottom: -1px;
    height: 28px;
    background: linear-gradient(180deg, transparent, rgba(180, 130, 60, 0.22) 60%, rgba(150, 100, 40, 0.35));
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }
  @media (max-width: 600px) {
    .oasis-scene { height: 80px; margin-bottom: 12px; }
    .palm { width: 60px; height: 80px; }
    .archway-bg { width: 160px; height: 70px; }
  }
  .wrap { max-width: 900px; margin: 0 auto; padding: 40px 24px 100px; }
  header h1 {
    font-size: 32px; margin: 0 0 8px;
    letter-spacing: -0.02em; font-weight: 700;
  }
  header p { color: var(--muted); margin: 0 0 32px; font-size: 15px; line-height: 1.6; }

  .meters {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;
    background: transparent; border: none;
    border-radius: 0; padding: 0; margin-bottom: 32px;
  }
  .meter {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; transition: border-color .2s ease;
  }
  .meter:hover { border-color: var(--accent); }
  .meter .label {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 12px; color: var(--muted); margin-bottom: 10px;
    text-transform: uppercase; letter-spacing: 0.07em; font-weight: 500;
  }
  .meter .value { color: var(--ink); font-weight: 700; font-size: 16px; }
  .bar {
    height: 10px; border-radius: 999px; background: #1a1f45; overflow: hidden;
  }
  .bar > span {
    display: block; height: 100%;
    transition: width .35s ease;
  }
  .bar.passage > span    { background: linear-gradient(90deg, #f0a500, #d4a853); }
  .bar.trust > span      { background: linear-gradient(90deg, #f472b6, #a78bfa); }
  .bar.integrity > span  { background: linear-gradient(90deg, #4ade80, #22d3ee); }

  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 22px 22px 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,.35);
  }
  .tag {
    display: inline-block; font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--accent);
    background: rgba(124,156,255,0.12); border: 1px solid rgba(124,156,255,0.3);
    padding: 4px 8px; border-radius: 999px; margin-bottom: 10px;
  }
  .scene-title { font-size: 20px; margin: 2px 0 10px; }
  .scene-body {
    color: #d7daf5; line-height: 1.55; font-size: 15px;
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; margin: 10px 0 16px;
    white-space: pre-wrap;
  }
  .scene-body em { color: var(--muted); font-style: normal; }

  .choices { display: grid; gap: 10px; }
  .choice {
    text-align: left; cursor: pointer;
    background: var(--panel-2); color: var(--ink);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 14px; line-height: 1.5;
    transition: transform .06s ease, border-color .15s ease, background .15s ease;
  }
  .choice:hover { border-color: var(--accent); background: #232853; }
  .choice:active { transform: translateY(1px); }

  .coach {
    margin-top: 16px; padding: 16px 18px;
    background: #0e1128; border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    border-radius: 10px; font-size: 14px; line-height: 1.6;
  }
  .coach h4 {
    margin: 0 0 8px; font-size: 11px; color: var(--gold);
    text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;
  }
  .sphinx-speaks {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  }
  .sphinx-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #e8c37a, #b8882f 60%, #8a5e1c);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border: 2px solid rgba(240, 196, 114, 0.55);
    box-shadow: 0 0 16px rgba(212, 168, 83, 0.35), inset 0 0 8px rgba(255, 220, 150, 0.25);
    overflow: hidden;
  }
  .sphinx-avatar svg { width: 32px; height: 32px; display: block; }
  .sphinx-avatar {
    animation: sphinxGlow 3.5s ease-in-out infinite, sphinxBreathe 4s ease-in-out infinite;
  }
  @keyframes sphinxGlow {
    0%, 100% { box-shadow: 0 0 16px rgba(212, 168, 83, 0.4), inset 0 0 10px rgba(255, 220, 150, 0.3); }
    25%      { box-shadow: 0 0 20px rgba(212, 168, 83, 0.5), inset 0 0 12px rgba(255, 220, 150, 0.4); }
    50%      { box-shadow: 0 0 32px rgba(212, 168, 83, 0.75), 0 0 48px rgba(212, 168, 83, 0.35), inset 0 0 14px rgba(255, 220, 150, 0.5); }
    75%      { box-shadow: 0 0 24px rgba(212, 168, 83, 0.55), inset 0 0 12px rgba(255, 220, 150, 0.38); }
  }
  @keyframes sphinxBreathe {
    0%, 100% { transform: scale(1); }
    25%      { transform: scale(1.03); }
    50%      { transform: scale(1.08); }
    75%      { transform: scale(1.04); }
  }
  /* Enhanced star twinkle with glow */
  @keyframes starsGlow {
    0%, 100% { opacity: 0.4; filter: drop-shadow(0 0 2px rgba(212, 168, 83, 0.2)); }
    50%      { opacity: 1; filter: drop-shadow(0 0 6px rgba(212, 168, 83, 0.6)) drop-shadow(0 0 2px rgba(255, 255, 255, 0.4)); }
  }
  /* Respect user preference */
  @media (prefers-reduced-motion: reduce) {
    .palm, .palm-right, .sphinx-avatar, body::before {
      animation: none !important;
    }
  }
  .sphinx-label {
    display: flex; flex-direction: column; gap: 2px;
  }
  .sphinx-name {
    font-size: 12px; color: var(--gold); text-transform: uppercase;
    letter-spacing: 0.1em; font-weight: 600;
  }
  .sphinx-title {
    font-size: 11px; color: var(--muted);
  }
  .deltas {
    display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;
    font-size: 12px; color: var(--muted);
  }
  .delta { padding: 3px 8px; border-radius: 999px; border: 1px solid var(--border); }
  .delta.pos { color: var(--good); border-color: #1f4a36; background: #0e2b1f; }
  .delta.neg { color: var(--bad); border-color: #4a1f1f; background: #2b0e0e; }
  .delta.neu { color: var(--muted); }

  .controls { display: flex; justify-content: space-between; margin-top: 16px; }
  button.primary {
    background: var(--accent); color: #0b0f22; border: none;
    padding: 10px 16px; border-radius: 10px; font-weight: 600;
    cursor: pointer; font-size: 14px;
  }
  button.ghost {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    padding: 10px 14px; border-radius: 10px; cursor: pointer; font-size: 13px;
  }
  button.primary:hover { filter: brightness(1.08); }
  button.ghost:hover { color: var(--ink); border-color: var(--accent); }

  .grade {
    text-align: center; padding: 16px 0 8px;
  }
  .grade .merit-level {
    font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--gold); font-weight: 600; margin-bottom: 10px;
  }
  .grade .big {
    font-size: 56px; font-weight: 700; letter-spacing: -0.02em;
    background: linear-gradient(90deg, #d4a853, #a78bfa);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    line-height: 1;
  }
  .grade .sub { color: var(--muted); margin-top: 8px; font-size: 14px; }
  .sphinx-verdict {
    background: var(--panel-2); border: 1px solid rgba(212,168,83,0.3);
    border-left: 3px solid var(--gold);
    border-radius: 10px; padding: 16px 18px;
    font-size: 15px; line-height: 1.6; color: #d7daf5;
    margin: 16px 0;
    font-style: italic;
  }
  .scrolls-earned { margin: 16px 0; }
  .scrolls-earned h4 {
    font-size: 12px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.08em; margin: 0 0 10px;
  }
  .scroll-list { display: flex; flex-direction: column; gap: 6px; }
  .scroll-item {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; padding: 8px 12px;
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 8px;
  }
  .scroll-item.unlocked { border-color: rgba(167,139,250,0.4); color: var(--ink); }
  .scroll-item.locked { opacity: 0.4; }
  .scroll-icon { font-size: 16px; }
  .scroll-name { flex: 1; }
  .scroll-status { font-size: 11px; }
  .scroll-item.unlocked .scroll-status { color: var(--good); }
  .scroll-item.locked .scroll-status { color: var(--muted); }

  footer { color: var(--muted); font-size: 12px; margin-top: 24px; text-align: center; }
  footer b { color: #cfd3f5; }

  /* --- Home screen / scenario picker --- */
  .progress-summary {
    display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
    margin-bottom: 22px; font-size: 13px; color: var(--muted);
  }
  .progress-summary .stat {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 14px;
  }
  .progress-summary .stat b { color: var(--ink); }

  .home-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  }
  @media (max-width: 600px) { .home-grid { grid-template-columns: 1fr; } }

  .scenario-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px; cursor: pointer;
    display: flex; flex-direction: column;
    transition: border-color .15s ease, background .15s ease, transform .06s ease;
    animation: fadeInUp .3s ease both;
  }
  .scenario-card:hover { border-color: var(--gold); background: #1c2040; }
  .scenario-card:active { transform: translateY(1px); }
  .scenario-card:nth-child(2) { animation-delay: .05s; }
  .scenario-card:nth-child(3) { animation-delay: .10s; }
  .scenario-card:nth-child(4) { animation-delay: .15s; }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .sc-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .sc-icon { font-size: 28px; }
  .sc-difficulty {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); background: rgba(154,160,199,0.1);
    padding: 3px 8px; border-radius: 999px; border: 1px solid var(--border);
  }
  .sc-difficulty.beginner     { color: var(--good); border-color: #1f4a36; background: #0e2b1f; }
  .sc-difficulty.intermediate { color: var(--warn); border-color: #4a3a1f; background: #2b220e; }
  .sc-difficulty.advanced     { color: var(--bad);  border-color: #4a1f1f; background: #2b0e0e; }

  .sc-title { font-size: 17px; margin: 0 0 4px; color: var(--ink); }
  .sc-subtitle { font-size: 13px; color: var(--muted); margin: 0 0 12px; }

  .sc-topics { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .sc-topic {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--accent); background: rgba(124,156,255,0.08);
    border: 1px solid rgba(124,156,255,0.2);
    padding: 2px 7px; border-radius: 999px;
  }

  .sc-footer {
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid var(--border); padding-top: 12px; margin-top: auto;
  }
  .sc-best { font-size: 12px; color: var(--muted); }
  .sc-best .grade-badge { font-weight: 700; }
  .sc-play { font-size: 13px; font-weight: 600; color: var(--gold); }
  .sc-steps { font-size: 11px; color: var(--muted); }
</style>
</head>

<script>
/* ----------------------------------------------------------------------
 * Close the Deal — MVP scenario engine
 * Everything is data-driven from the SCENARIOS array below so non-coders
 * can add new scenarios or steps later by editing JSON-ish structures.

const SPHINX = {

  title: "Keeper of the Oases",

      <line x1="20" y1="21" x2="31" y2="21"/>
    </g>
    <!-- Eye dot -->
    <circle cx="24" cy="14" r="0.7" fill="#f0c472"/>
  </svg>`,
};

const SCROLLS = {
  "acme-corp": [
    { icon: "📜", name: "Scrolls of CloudForge (MSA)" },
    { icon: "💰", name: "Wisdom of the Super-Cap" },
    { icon: "🔄", name: "Scroll of Balanced Renewal" },
    { icon: "🧠", name: "Guidance on IP Claims" },
    { icon: "🔐", name: "Essence of Data Guardianship" },
    { icon: "⚡", name: "Scroll of Swift Closure" },

  "startup-sweetheart": [
    { icon: "🤝", name: "Quick Founder Walkthrough" },

    { icon: "🔁", name: "Trial-to-Contract Playbook" },
    { icon: "🔐", name: "DPA Basics Checklist" },
    { icon: "✍️", name: "Signature Authority Guide" },
    { icon: "📜", name: "Feature Commitment Playbook" },
  ],
};

/* Each step has:
 *   tag:    small label shown above the title
 *   title:  short scene title
 *   body:   the email / situation text (supports \n)
 *   choices: array of { label, deltas:{velocity,risk,relation}, coach }
 */
const SCENARIOS = [
{
  id: "acme-corp",
  icon: "\uD83D\uDCBC",
  difficulty: "Beginner",

/* --------------------------- engine --------------------------------- */

const state = {
  screen: "home",       // "home" | "playing" | "result"
  scenarioId: null,
  stepIndex: 0,
  pillars: { ...Object.fromEntries(Object.entries(PILLARS).map(([k,v]) => [k, v.start])) },
  finished: false,
  awaitingNext: false,
  lastCoach: null,
  introShown: false,
};

const $header = document.getElementById("appHeader");
const $pillars = document.getElementById("pillars");
const $stage  = document.getElementById("stage");

function clamp(n) { return Math.max(0, Math.min(100, n)); }
function currentScenario() { return SCENARIOS.find(s => s.id === state.scenarioId); }

/* ---- localStorage: best score per scenario ---- */
function getBestScore(id) {
  try {
    const raw = localStorage.getItem(`closethedeal_${id}_best`);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    // Backward compat: old saves used letter grades (A/B/C/D/F)
    if (parsed.letter && !parsed.level) {
      const map = { A:"ENLIGHTENED", B:"WORTHY", C:"PREPARED", D:"NOVICE", F:"UNWORTHY" };
      parsed.level = map[parsed.letter] || parsed.letter;
    }
    return parsed;
  } catch { return null; }
}
function saveBestScore(id, score, level) {
  try {
    const cur = getBestScore(id);
    if (!cur || score > cur.score) {
      localStorage.setItem(`closethedeal_${id}_best`, JSON.stringify({ score, level }));
    }
  } catch { /* private browsing — skip silently */ }
}
function meritColor(level) {
  if (level === "ENLIGHTENED") return "var(--good)";
  if (level === "WORTHY")      return "var(--gold)";
  if (level === "PREPARED")    return "var(--accent)";
  if (level === "NOVICE")      return "var(--warn)";
  return "var(--bad)";
}

function renderPillars() {
  $pillars.innerHTML = Object.entries(PILLARS).map(([key, def]) => {
    const val = clamp(state.pillars[key]);
    return `
      <div class="meter">
        <div class="label"><span>${def.icon} ${def.label}</span><span class="value">${val}</span></div>
        <div class="bar ${def.barClass}"><span style="width:${val}%"></span></div>
      </div>`;
  }).join("");
}

function renderStep() {
  if (state.finished) return renderEnd();
  const scenario = currentScenario();

  $pillars.style.display = "";
  $header.innerHTML = `
    <h1>🏜️ The Gatekeeper of the Oasis</h1>
    <p>${scenario.title}</p>`;
  renderPillars();

  if (state.stepIndex === 0 && !state.introShown) {
    // Intro card — you approach the oasis
    $stage.innerHTML = `
      <div class="card">
        <div class="sphinx-speaks">
          <div class="sphinx-avatar">${SPHINX.avatar}</div>
          <div class="sphinx-label">
            <div class="sphinx-name">${SPHINX.name}</div>
            <div class="sphinx-title">${SPHINX.title}</div>
          </div>
        </div>
        <span class="tag">You approach the oasis</span>
        <h2 class="scene-title">${scenario.title}</h2>
        <div class="scene-body">${scenario.intro.replace(/\n/g,"<br/>")}</div>
        <div class="controls">
          <button class="ghost" id="backHomeBtn">← Back to the oases</button>
          <button class="primary" id="startBtn">Face the Sphinx →</button>
        </div>
      </div>`;
    document.getElementById("startBtn").onclick = () => {
      state.introShown = true;
      renderStep();
    };
    document.getElementById("backHomeBtn").onclick = goHome;
    return;
  }

  const step = scenario.steps[state.stepIndex];
  const riddleNum = state.stepIndex + 1;
  const totalRiddles = scenario.steps.length;
  $stage.innerHTML = `
    <div class="card">
      <div class="sphinx-speaks">
        <div class="sphinx-avatar">${SPHINX.avatar}</div>
        <div class="sphinx-label">
          <div class="sphinx-name">${SPHINX.name}</div>
          <div class="sphinx-title">poses riddle ${riddleNum} of ${totalRiddles}</div>
        </div>
      </div>
      <span class="tag">${step.tag}</span>
      <h2 class="scene-title">${step.title}</h2>
      <div class="scene-body">${step.body.replace(/\n/g,"<br/>")}</div>
      <div class="choices" id="choices"></div>
      <div id="coachSlot"></div>
      <div class="controls" id="controls"></div>
    </div>`;

  const $choices = document.getElementById("choices");
  step.choices.forEach((c, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = c.label;
    btn.onclick = () => pickChoice(i);
    $choices.appendChild(btn);
  });
}

// Map legacy scenario deltas to the three pillars.
// velocity → passageKey (same sign)
// relation → ritualOfTrust (same sign)
// risk → structuralIntegrity (INVERTED: +risk means -integrity)
function mapDeltasToPillars(deltas) {
  return {
    passageKey:          deltas.velocity || 0,
    ritualOfTrust:       deltas.relation || 0,
    structuralIntegrity: -(deltas.risk   || 0),
  };
}

function pickChoice(i) {
  const step = currentScenario().steps[state.stepIndex];
  const choice = step.choices[i];
  const pillarDeltas = mapDeltasToPillars(choice.deltas);

  // apply deltas to the three pillars
  for (const [k, v] of Object.entries(pillarDeltas)) {
    state.pillars[k] = clamp(state.pillars[k] + v);
  }
  renderPillars();

  // disable choice buttons
  document.querySelectorAll(".choice").forEach(b => {
    b.disabled = true;
    b.style.opacity = 0.55;
    b.style.cursor = "default";
  });
  // highlight chosen
  document.querySelectorAll(".choice")[i].style.borderColor = "var(--gold)";
  document.querySelectorAll(".choice")[i].style.opacity = 1;

  // show Sphinx's judgment
  const deltasHtml = Object.entries(pillarDeltas).map(([k,v]) => {
    const def = PILLARS[k];
    if (v === 0) return `<span class="delta neu">${def.icon} ${def.label}: 0</span>`;
    const cls = v > 0 ? "pos" : "neg";
    const sign = v > 0 ? "+" : "";
    return `<span class="delta ${cls}">${def.icon} ${def.label}: ${sign}${v}</span>`;
  }).join("");

  document.getElementById("coachSlot").innerHTML = `
    <div class="coach">
      <h4>The Sphinx Judges</h4>
      <div>${choice.coach}</div>
      <div class="deltas">${deltasHtml}</div>
    </div>`;

  const nextLabel = state.stepIndex === currentScenario().steps.length - 1 ? "Face the Sphinx's verdict →" : "Next riddle →";
  document.getElementById("controls").innerHTML =
    `<span></span><button class="primary" id="nextBtn">${nextLabel}</button>`;
  document.getElementById("nextBtn").onclick = advance;
}

function advance() {
  if (state.stepIndex >= currentScenario().steps.length - 1) {
    state.finished = true;
    state.screen = "result";
    renderEnd();
    return;
  }
  state.stepIndex += 1;
  state.lastCoach = null;
  renderStep();
}

function grade() {
  // Higher passageKey, structuralIntegrity, ritualOfTrust = better
  const { passageKey, ritualOfTrust, structuralIntegrity } = state.pillars;
  const score = Math.round((passageKey * 0.25) + (structuralIntegrity * 0.55) + (ritualOfTrust * 0.20));
  let level, headline, body;
  if (score >= 85) {
    level = "ENLIGHTENED";
    headline = "The Sphinx bows slightly.";
    body = "'Swift, trustworthy, and sound. You walk the way of masters. The oasis is yours.'";
  } else if (score >= 70) {
    level = "WORTHY";
    headline = "The Sphinx nods.";
    body = "'You have proven your judgment. You may pass.'";
  } else if (score >= 55) {
    level = "PREPARED";
    headline = "The Sphinx is satisfied.";
    body = "'You will learn. Return when you understand more.'";
  } else if (score >= 40) {
    level = "NOVICE";
    headline = "The Sphinx is patient.";
    body = "'You have much to learn. The cracks in your foundation are clear. Return when you are ready.'";
  } else {
    level = "UNWORTHY";
    headline = "The Sphinx does not step aside.";
    body = "'You are not ready for this oasis. Your deal would shatter before the sun sets. Study and return.'";
  }
  return { score, level, headline, body };
}

function computeUnlockedScrolls(scenarioId, pillars) {
  const { passageKey, ritualOfTrust, structuralIntegrity } = pillars;
  const list = SCROLLS[scenarioId] || [];
  const rules = {
    "acme-corp": [
      true,                           // always: CloudForge MSA (starting scroll)
      structuralIntegrity >= 75,      // Super-Cap wisdom requires legal rigor
      ritualOfTrust >= 70,            // Balanced Renewal requires trust
      structuralIntegrity >= 80,      // IP Claim guidance requires rigor
      structuralIntegrity >= 70,      // Data Guardianship requires rigor
      passageKey >= 65,               // Swift Closure requires decisiveness
    ],
    "startup-sweetheart": [
      true,                           // always: Founder Walkthrough (starting)
      structuralIntegrity >= 70,      // Side-deal log requires rigor
      structuralIntegrity >= 75,      // Trial-to-Contract requires rigor
      structuralIntegrity >= 80,      // DPA checklist requires rigor
      ritualOfTrust >= 65,            // Signature Authority requires trust
      ritualOfTrust >= 70,            // Feature Commitment playbook
    ],
  };
  const r = rules[scenarioId] || list.map(() => false);
  return list.map((s, i) => ({ ...s, unlocked: !!r[i] }));
}

function renderEnd() {
  const g = grade();
  const scenario = currentScenario();
  saveBestScore(scenario.id, g.score, g.level);

  const scrolls = computeUnlockedScrolls(scenario.id, state.pillars);
  const unlockedCount = scrolls.filter(s => s.unlocked).length;

  $pillars.style.display = "";
  $header.innerHTML = `
    <h1>🏜️ The Gatekeeper of the Oasis</h1>
    <p>${scenario.title}</p>`;
  renderPillars();

  const scrollListHtml = scrolls.map(s => `
    <div class="scroll-item ${s.unlocked ? 'unlocked' : 'locked'}">
      <span class="scroll-icon">${s.icon}</span>
      <span class="scroll-name">${s.name}</span>
      <span class="scroll-status">${s.unlocked ? '✓ Earned' : '✗ Locked'}</span>
    </div>`).join("");

  $stage.innerHTML = `
    <div class="card">
      <div class="sphinx-speaks">
        <div class="sphinx-avatar">${SPHINX.avatar}</div>
        <div class="sphinx-label">
          <div class="sphinx-name">${SPHINX.name}</div>
          <div class="sphinx-title">${SPHINX.title}</div>
        </div>
      </div>
      <span class="tag">The Sphinx's Verdict</span>
      <div class="grade">
        <div class="merit-level" style="color:${meritColor(g.level)}">${g.level}</div>
        <div class="big" style="background: linear-gradient(90deg, ${meritColor(g.level)}, var(--scroll-color)); -webkit-background-clip: text; background-clip: text; color: transparent;">${g.score}</div>
        <div class="sub">Composite score / 100</div>
      </div>
      <div class="sphinx-verdict">
        <strong>${g.headline}</strong><br>${g.body}
      </div>
      <div class="scrolls-earned">
        <h4>Sacred Scrolls Earned — ${unlockedCount} / ${scrolls.length}</h4>
        <div class="scroll-list">${scrollListHtml}</div>
      </div>
      <div class="controls">
        <button class="ghost" id="backHomeBtn">← Back to the oases</button>
        <button class="primary" id="replayBtn">↺ Face the Sphinx again</button>
      </div>
    </div>`;
  document.getElementById("replayBtn").onclick = () => startScenario(scenario.id);
  document.getElementById("backHomeBtn").onclick = goHome;
}

/* --------------------------- navigation ----------------------------- */

function startScenario(id) {
  state.screen = "playing";
  state.scenarioId = id;
  state.stepIndex = 0;
  state.finished = false;
  state.awaitingNext = false;
  state.lastCoach = null;
  state.introShown = false;
  state.pillars = Object.fromEntries(Object.entries(PILLARS).map(([k,v]) => [k, v.start]));
  render();
}

function goHome() {
  state.screen = "home";
  state.scenarioId = null;
  state.finished = false;
  render();
}

function render() {
  if (state.screen === "home") return renderHome();
  if (state.screen === "result") return renderEnd();
  return renderStep();
}

function renderHome() {
  $pillars.style.display = "none";
  $header.innerHTML = `
    <h1>🏜️ The Gatekeeper of the Oasis</h1>
    <p>A legal wisdom trial for SaaS account executives. You are the Traveler. Choose an oasis. Face the Sphinx. Earn sacred scrolls through wise judgment.</p>`;

  // Progress summary
  const played = SCENARIOS.filter(s => getBestScore(s.id)).length;
  const total = SCENARIOS.length;
  const bestGrade = SCENARIOS
    .map(s => getBestScore(s.id))
    .filter(Boolean)
    .sort((a, b) => b.score - a.score)[0];
  const summaryHtml = `
    <div class="progress-summary">
      <div class="stat"><b>${played}</b> / ${total} oases tested</div>
      ${bestGrade ? `<div class="stat">Highest merit: <b style="color:${meritColor(bestGrade.level)}">${bestGrade.level}</b> (${bestGrade.score})</div>` : ""}
    </div>`;

  const cardsHtml = SCENARIOS.map(s => {
    const best = getBestScore(s.id);
    const bestHtml = best
      ? `Best: <span class="grade-badge" style="color:${meritColor(best.level)}">${best.level}</span> (${best.score})`
      : `Not yet faced`;
    const topicsHtml = s.topics.map(t => `<span class="sc-topic">${t}</span>`).join("");
    const diffClass = s.difficulty.toLowerCase();
    return `
      <div class="scenario-card" data-id="${s.id}">
        <div class="sc-header">
          <span class="sc-icon">${s.icon}</span>
          <span class="sc-difficulty ${diffClass}">${s.difficulty}</span>
        </div>
        <h3 class="sc-title">${s.title}</h3>
        <p class="sc-subtitle">${s.subtitle}</p>
        <div class="sc-topics">${topicsHtml}</div>
        <div class="sc-footer">
          <div>
            <div class="sc-best">${bestHtml}</div>
            <div class="sc-steps">${s.steps.length} riddles</div>
          </div>
          <span class="sc-play">Approach →</span>
        </div>
      </div>`;
  }).join("");

  $stage.innerHTML = `${summaryHtml}<div class="home-grid">${cardsHtml}</div>`;

  document.querySelectorAll(".scenario-card").forEach(card => {
    card.onclick = () => startScenario(card.dataset.id);
  });
}

/* --------------------------- boot ----------------------------------- */
render();
</script>
</body>
</html>
